<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Self-Grade Assistant — Options</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        max-width: 720px;
        margin: 24px auto;
        padding: 0 16px;
        line-height: 1.5;
        color: #0f172a;
      }
      h1 {
        font-size: 1.25rem;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      textarea {
        width: 100%;
        min-height: 180px;
        padding: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
      }
      p.hint {
        font-size: 13px;
        color: #64748b;
        margin-top: 8px;
      }
      button {
        margin-top: 16px;
        padding: 10px 18px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #4338ca;
      }
      #status {
        margin-top: 12px;
        font-size: 13px;
        color: #16a34a;
      }
    </style>
  </head>
  <body>
    <h1>AI Self-Grade Assistant</h1>
    <p class="hint">
      The extension cannot know a true confidence score by itself. The text below is appended to your composer so the
      <strong>model</strong> reports calibrated confidence and caveats.
    </p>
    <label for="suffix">Text appended by “Append confidence request”</label>
    <textarea id="suffix" spellcheck="true"></textarea>
    <button type="button" id="save">Save</button>
    <p id="status"></p>
    <script src="options.js"></script>
  </body>
</html>
